name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "hf-space/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://DaMaker1291:$HF_TOKEN@huggingface.co/spaces/DaMaker1291/pharos-nft-ad-generator
          git subtree push --prefix hf-space space main
